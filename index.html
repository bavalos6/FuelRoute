<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FuelRoute — Road Trip Gas Estimator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg: #0c0f0a;
      --bg2: #131610;
      --bg3: #1a1e15;
      --border: rgba(180, 210, 100, 0.12);
      --accent: #b4d264;
      --accent2: #7eb83a;
      --muted: #6b7a55;
      --text: #e8f0d0;
      --text2: #a8b890;
      --danger: #e87040;
      --card: #161a12;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      font-size: 15px;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 20px;
      letter-spacing: -0.5px;
      color: var(--accent);
    }

    .logo span {
      color: var(--text2);
      font-weight: 400;
    }

    .tagline {
      font-size: 12px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.05em;
    }

    .app {
      display: grid;
      grid-template-columns: 420px 1fr;
      height: calc(100vh - 56px);
    }

    .sidebar {
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .sidebar::-webkit-scrollbar {
      width: 4px;
    }

    .sidebar::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 0.6rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.1rem;
    }

    label {
      display: block;
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 5px;
      font-weight: 500;
    }

    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus,
    select:focus {
      border-color: var(--accent2);
    }

    .toggle-row {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }

    .toggle-btn {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text2);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 7px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .toggle-btn.active {
      background: rgba(180, 210, 100, 0.12);
      border-color: var(--accent2);
      color: var(--accent);
    }

    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #0c0f0a;
      border: none;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      padding: 13px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.02em;
    }

    .results {
      display: none;
      flex-direction: column;
      gap: 1rem;
    }

    .results.show {
      display: flex;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat-box {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.85rem 1rem;
    }

    .stat-box.highlight {
      background: rgba(180, 210, 100, 0.08);
      border-color: rgba(180, 210, 100, 0.3);
    }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 3px;
    }

    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }

    .stat-value.normal {
      color: var(--text);
      font-size: 18px;
    }

    .breakdown-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      background: var(--bg3);
      border-radius: 6px;
      border: 1px solid var(--border);
      font-size: 13px;
    }

    .state-flag {
      width: 28px;
      height: 20px;
      border-radius: 3px;
      background: var(--bg2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      color: var(--accent);
      font-weight: 500;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }

    .progress-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 4px;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent2);
      transition: width 0.8s ease;
    }

    .map-pane {
      position: relative;
    }

    #map {
      height: 100%;
      width: 100%;
      background: var(--bg2);
    }

    .map-overlay {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 1000;
      background: rgba(12, 15, 10, 0.92);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      display: none;
      min-width: 200px;
    }

    .map-overlay.show {
      display: block;
    }

    .suggestions-list {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #1e2418;
      border: 1px solid var(--border);
      border-radius: 8px;
      z-index: 200;
      max-height: 200px;
      overflow-y: auto;
      display: none;
    }

    .suggestions-list.show {
      display: block;
    }

    .suggestion-item {
      padding: 9px 12px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text2);
      border-bottom: 1px solid var(--border);
    }

    .suggestion-item:hover {
      background: rgba(180, 210, 100, 0.08);
      color: var(--text);
    }

    .loader {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 12px;
      color: var(--text2);
      font-size: 13px;
    }

    .loader.show {
      display: flex;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .error-msg {
      display: none;
      background: rgba(232, 112, 64, 0.1);
      border: 1px solid rgba(232, 112, 64, 0.3);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      color: var(--danger);
    }

    .error-msg.show {
      display: block;
    }

    .gas-note {
      font-size: 11px;
      color: var(--muted);
      padding: 8px 10px;
      background: var(--bg3);
      border-radius: 6px;
      border-left: 3px solid var(--accent2);
      line-height: 1.5;
    }

    @media (max-width: 768px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto 350px;
        height: auto;
      }

      .map-pane {
        height: 350px;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="logo">Fuel<span>Route</span></div>
    <div class="tagline">road trip gas estimator</div>
  </header>
  <div class="app">
    <div class="sidebar">
      <div class="card">
        <div class="section-label">Route</div>
        <div class="form-group autocomplete-wrapper">
          <label>Origin</label>
          <input type="text" id="origin" placeholder="e.g. Dallas, TX" autocomplete="off" />
          <div class="suggestions-list" id="origin-suggestions"></div>
        </div>
        <div class="form-group autocomplete-wrapper">
          <label>Destination</label>
          <input type="text" id="destination" placeholder="e.g. Sunnyvale, CA" autocomplete="off" />
          <div class="suggestions-list" id="dest-suggestions"></div>
        </div>
      </div>
      <div class="card">
        <div class="section-label">Vehicle</div>
        <div class="toggle-row">
          <button class="toggle-btn active" id="tab-lookup" onclick="switchVehicleTab('lookup')">Look up car</button>
          <button class="toggle-btn" id="tab-manual" onclick="switchVehicleTab('manual')">Enter MPG</button>
        </div>
        <div id="vehicle-lookup">
          <div class="input-row">
            <div class="form-group"><label>Year</label><select id="v-year" onchange="loadMakes()">
                <option value="">Year</option>
              </select></div>
            <div class="form-group"><label>Make</label><select id="v-make" onchange="loadModels()" disabled>
                <option value="">Make</option>
              </select></div>
          </div>
          <div class="input-row">
            <div class="form-group"><label>Model</label><select id="v-model" onchange="loadTrims()" disabled>
                <option value="">Model</option>
              </select></div>
            <div class="form-group"><label>Trim</label><select id="v-trim" disabled>
                <option value="">Trim</option>
              </select></div>
          </div>
          <div id="mpg-display" style="display:none;" class="form-group">
            <div
              style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:9px 12px;font-size:13px;">
              <span style="color:var(--text2);">Combined MPG: </span><span id="mpg-value"
                style="color:var(--accent);font-weight:500;"></span></div>
          </div>
        </div>
        <div id="vehicle-manual" style="display:none;">
          <div class="form-group"><label>Combined MPG</label><input type="number" id="manual-mpg" placeholder="28" />
          </div>
          <div class="form-group"><label>Tank size (optional)</label><input type="number" id="manual-tank"
              placeholder="14" /></div>
        </div>
      </div>
      <div class="card">
        <div class="section-label">Fuel Type</div>
        <div class="toggle-row">
          <button class="toggle-btn active" id="fuel-regular" onclick="setFuel('regular')">Regular</button>
          <button class="toggle-btn" id="fuel-midgrade" onclick="setFuel('midgrade')">Mid</button>
          <button class="toggle-btn" id="fuel-premium" onclick="setFuel('premium')">Premium</button>
          <button class="toggle-btn" id="fuel-diesel" onclick="setFuel('diesel')">Diesel</button>
        </div>
      </div>
      <button class="btn-primary" id="calc-btn" onclick="calculate()">Calculate Trip Cost →</button>
      <div class="loader" id="loader">
        <div class="spinner"></div><span id="loader-text">Loading...</span>
      </div>
      <div class="error-msg" id="error-msg"></div>
      <div class="results" id="results">
        <div class="stat-grid">
          <div class="stat-box highlight">
            <div class="stat-label">Total cost</div>
            <div class="stat-value" id="res-cost">—</div>
            <div class="stat-sub" id="res-cost-range"></div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Distance</div>
            <div class="stat-value normal" id="res-distance">—</div>
            <div class="stat-sub" id="res-duration"></div>
          </div>
        </div>
        <div class="card">
          <div class="section-label">By State</div>
          <div class="breakdown-list" id="state-breakdown"></div>
        </div>
        <div class="gas-note" id="gas-note"></div>
      </div>
    </div>
    <div class="map-pane">
      <div id="map"></div>
      <div class="map-overlay" id="map-overlay">
        <div class="map-overlay-title">Trip Summary</div>
        <div id="ov-from"></div>
        <div id="ov-to"></div>
        <div id="ov-dist"></div>
        <div id="ov-cost"></div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    let map, routeLayer, originMarker, destMarker;
    let selectedFuel = 'regular', vehicleMode = 'lookup', currentMPG = null;
    let STATE_GAS_PRICES = {};

    const STATE_NAMES = { AL: 'Alabama', AK: 'Alaska', AZ: 'Arizona', AR: 'Arkansas', CA: 'California', CO: 'Colorado', CT: 'Connecticut', DE: 'Delaware', FL: 'Florida', GA: 'Georgia', HI: 'Hawaii', ID: 'Idaho', IL: 'Illinois', IN: 'Indiana', IA: 'Iowa', KS: 'Kansas', KY: 'Kentucky', LA: 'Louisiana', ME: 'Maine', MD: 'Maryland', MA: 'Massachusetts', MI: 'Michigan', MN: 'Minnesota', MS: 'Mississippi', MO: 'Missouri', MT: 'Montana', NE: 'Nebraska', NV: 'Nevada', NH: 'New Hampshire', NJ: 'New Jersey', NM: 'New Mexico', NY: 'New York', NC: 'North Carolina', ND: 'North Dakota', OH: 'Ohio', OK: 'Oklahoma', OR: 'Oregon', PA: 'Pennsylvania', RI: 'Rhode Island', SC: 'South Carolina', SD: 'South Dakota', TN: 'Tennessee', TX: 'Texas', UT: 'Utah', VT: 'Vermont', VA: 'Virginia', WA: 'Washington', WV: 'West Virginia', WI: 'Wisconsin', WY: 'Wyoming' };

    const STATE_BOUNDS = [
      { code: 'WA', xMin: -124.76, xMax: -116.91, yMin: 45.54, yMax: 49.00 }, { code: 'OR', xMin: -124.57, xMax: -116.46, yMin: 41.99, yMax: 46.23 }, { code: 'CA', xMin: -124.48, xMax: -114.13, yMin: 32.53, yMax: 42.01 }, { code: 'NV', xMin: -120.00, xMax: -114.04, yMin: 35.00, yMax: 42.00 }, { code: 'ID', xMin: -117.24, xMax: -111.04, yMin: 41.99, yMax: 49.00 }, { code: 'UT', xMin: -114.05, xMax: -109.04, yMin: 37.00, yMax: 41.00 }, { code: 'AZ', xMin: -114.82, xMax: -109.04, yMin: 31.33, yMax: 37.00 }, { code: 'MT', xMin: -116.05, xMax: -104.04, yMin: 44.35, yMax: 49.00 }, { code: 'WY', xMin: -111.05, xMax: -104.05, yMin: 41.00, yMax: 45.00 }, { code: 'CO', xMin: -109.06, xMax: -102.04, yMin: 37.00, yMax: 41.00 }, { code: 'NM', xMin: -109.05, xMax: -103.00, yMin: 31.33, yMax: 37.00 }, { code: 'TX', xMin: -106.65, xMax: -93.51, yMin: 25.84, yMax: 36.50 }, { code: 'NY', xMin: -79.76, xMax: -71.86, yMin: 40.50, yMax: 45.02 }, { code: 'PA', xMin: -80.52, xMax: -74.69, yMin: 39.72, yMax: 42.27 }
    ];

    async function loadGasPrices() {
      try {
        const response = await fetch('./gas_prices.json');
        STATE_GAS_PRICES = await response.json();
        if (STATE_GAS_PRICES.regular?.last_updated) {
          document.getElementById('gas-note').innerHTML = `Prices updated: <b>${STATE_GAS_PRICES.regular.last_updated}</b>. Source: AAA`;
        }
      } catch (error) {
        STATE_GAS_PRICES = { regular: { DEFAULT: 3.50, TX: 3.10, CA: 4.90 } };
      }
    }

    function initMap() {
      if (map) return;
      map = L.map('map').setView([37.5, -96], 4);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
    }

    function initYears() {
      const sel = document.getElementById('v-year');
      for (let y = new Date().getFullYear(); y >= 1990; y--) sel.innerHTML += `<option value="${y}">${y}</option>`;
    }

    window.onload = () => { initMap(); initYears(); loadGasPrices(); };

    async function geocodeSuggest(query, listId) {
      if (query.length < 3) return hideSuggestions(listId);
      try {
        const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=5&countrycodes=us`, {
          headers: { 'User-Agent': 'FuelRoute-Trip-Bot' }
        });
        const d = await r.json();
        const list = document.getElementById(listId);
        list.innerHTML = d.map(r => `<div class="suggestion-item" onclick="selectSuggestion('${listId}', '${r.display_name.replace(/'/g, "\\'")}')">${r.display_name}</div>`).join('');
        list.classList.add('show');
      } catch (e) { }
    }

    function selectSuggestion(listId, val) {
      document.getElementById(listId === 'origin-suggestions' ? 'origin' : 'destination').value = val;
      hideSuggestions(listId);
    }
    function hideSuggestions(id) { document.getElementById(id).classList.remove('show'); }

    document.getElementById('origin').oninput = e => geocodeSuggest(e.target.value, 'origin-suggestions');
    document.getElementById('destination').oninput = e => geocodeSuggest(e.target.value, 'dest-suggestions');

    function getStateByCoordinates(lon, lat) {
      for (const zone of STATE_BOUNDS) {
        if (lon >= zone.xMin && lon <= zone.xMax && lat >= zone.yMin && lat <= zone.yMax) return zone.code;
      }
      return 'DEFAULT';
    }

    async function calculate() {
      const originText = document.getElementById('origin').value;
      const destText = document.getElementById('destination').value;
      let mpg = vehicleMode === 'manual' ? parseFloat(document.getElementById('manual-mpg').value) : currentMPG;
      if (!mpg) return alert("Select vehicle or MPG");

      showLoader('Planning route...');
      try {
        const [o, d] = await Promise.all([
          fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(originText)}&format=json&limit=1`, { headers: { 'User-Agent': 'FuelRoute' } }).then(r => r.json()),
          fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(destText)}&format=json&limit=1`, { headers: { 'User-Agent': 'FuelRoute' } }).then(r => r.json())
        ]);

        const routeUrl = `https://router.project-osrm.org/route/v1/driving/${o[0].lon},${o[0].lat};${d[0].lon},${d[0].lat}?overview=full&geometries=geojson`;
        const rRes = await fetch(routeUrl).then(r => r.json());
        const route = rRes.routes[0];
        const distMi = (route.distance / 1609.34);
        const duration = (route.duration * 0.88) / 60;

        const coords = route.geometry.coordinates;
        const statesFound = [];
        for (let i = 0; i < coords.length; i += Math.floor(coords.length / 15)) {
          const code = getStateByCoordinates(coords[i][0], coords[i][1]);
          if (!statesFound.includes(code)) statesFound.push(code);
        }

        const fuelNeeded = distMi / mpg;
        const prices = STATE_GAS_PRICES[selectedFuel] || { DEFAULT: 3.50 };
        let totalCost = 0;
        statesFound.forEach(s => totalCost += (fuelNeeded / statesFound.length) * (prices[s] || prices.DEFAULT));

        renderResults(distMi, duration, totalCost, fuelNeeded, statesFound);
        drawRoute(route.geometry.coordinates, o[0], d[0]);
        hideLoader();
      } catch (e) { hideLoader(); alert("Error calculating trip."); }
    }

    function renderResults(mi, min, cost, gal, states) {
      document.getElementById('res-cost').textContent = '$' + cost.toFixed(2);
      document.getElementById('res-distance').textContent = Math.round(mi) + ' mi';
      document.getElementById('res-duration').textContent = `~${Math.floor(min / 60)}h ${Math.round(min % 60)}m`;
      document.getElementById('state-breakdown').innerHTML = states.map(s => `<div class="breakdown-item"><div class="state-flag">${s}</div><span>${STATE_NAMES[s] || s}</span></div>`).join('');
      document.getElementById('results').classList.add('show');
    }

    function drawRoute(coords, o, d) {
      if (routeLayer) map.removeLayer(routeLayer);
      routeLayer = L.polyline(coords.map(c => [c[1], c[0]]), { color: '#b4d264' }).addTo(map);
      map.fitBounds(routeLayer.getBounds());
    }

    function showLoader(t) { document.getElementById('loader-text').textContent = t; document.getElementById('loader').classList.add('show'); }
    function hideLoader() { document.getElementById('loader').classList.remove('show'); }
    function switchVehicleTab(t) { vehicleMode = t; document.getElementById('vehicle-lookup').style.display = t === 'lookup' ? 'block' : 'none'; document.getElementById('vehicle-manual').style.display = t === 'manual' ? 'block' : 'none'; }
    function setFuel(f) { selectedFuel = f; }
  </script>
</body>

</html>
