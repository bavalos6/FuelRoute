name: Update Gas Prices

on:
  schedule:
    - cron: '0 0 * * 1' # Runs at midnight every Monday
  workflow_dispatch: # Allows you to run it manually for testing

permissions:
  contents: write
  
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python update_prices.py

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add gas_prices.json
          git commit -m "Automated: Update gas prices" || exit 0
          git push